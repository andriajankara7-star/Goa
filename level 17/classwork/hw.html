<!-- 
  b tag - ით ჩვენ შეგვიძლია საიტზე უფრო მუქად დავწეროთ
  i tag - ით ჩვენ შეგვიძლია საიტზე დასწეროთ დახრილად
  u tag - ით ჩვენ შეგვიძლია საიტზე რომ ტექსტს დაბლა ხაზი გასმული ჰქონდეს
  სემატიკური თეგი არის ლოგიკური თეგი
  em თეგი არის სემატიკური i თეგი დახრილად წერს
  strong თეგი არის სემანტიკური b თეგი მუქად წერს
  -->
<b>hello</b>
<strong>my name is anton</strong>
<i>every single day</i>
<em>i wake up</em>
<u>i brush my teeth</u>
